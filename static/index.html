<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 资源空间</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <!-- 左侧 3D 场景 -->
        <div class="scene-panel">
            <div id="scene-container"></div>
            <div class="scene-hint">拖拽旋转 · 滚轮缩放 · 右键平移</div>
        </div>
        <!-- 右侧操作面板 -->
        <div class="control-panel">
            <!-- 创建中心点 -->
            <div class="panel-section">
                <h3 class="section-title">+ 创建中心点</h3>
                <input id="center-name" type="text" placeholder="名称" class="input-field">
                <div class="coord-row">
                    <input id="center-x" type="number" value="0" placeholder="X" class="input-field coord">
                    <input id="center-y" type="number" value="0" placeholder="Y" class="input-field coord">
                    <input id="center-z" type="number" value="0" placeholder="Z" class="input-field coord">
                </div>
                <button id="btn-add-center" class="btn btn-center">添加中心点</button>
            </div>
            <!-- 创建资源球 -->
            <div class="panel-section">
                <h3 class="section-title">+ 创建资源球</h3>
                <div class="name-row">
                    <input id="sphere-name" type="text" placeholder="名称" class="input-field">
                    <input id="sphere-radius" type="number" value="1" step="0.1" min="0.1" placeholder="模长" class="input-field short">
                </div>
                <div class="section-label">关联中心点及权重：</div>
                <div id="sphere-relations" class="relation-list"></div>
                <div id="sphere-preview" class="coord-preview"></div>
                <button id="btn-add-sphere" class="btn btn-sphere">添加资源球</button>
            </div>
            <!-- 投影查询 -->
            <div class="panel-section">
                <h3 class="section-title">🔍 投影查询</h3>
                <div class="section-label">起点资源球：</div>
                <select id="proj-source" class="input-field">
                    <option value="">选择资源球...</option>
                </select>
                <div class="section-label">方向参考资源球：</div>
                <select id="proj-target" class="input-field">
                    <option value="">选择资源球...</option>
                </select>
                <div class="section-label">圆柱半径：</div>
                <input id="proj-radius" type="number" value="2" step="0.1" min="0.1" class="input-field">
                <div class="section-label">筛选模式：</div>
                <div class="filter-modes">
                    <button class="filter-btn" data-mode="intersect">相交</button>
                    <button class="filter-btn" data-mode="contain">包含</button>
                    <button class="filter-btn active" data-mode="both">两者</button>
                </div>
                <button id="btn-add-projection" class="btn btn-projection">添加投影</button>
                <div class="section-label" style="margin-top:10px;">已添加投影：</div>
                <div id="projection-list"></div>
                <div id="projection-result" class="projection-result" style="display:none;">
                    <div class="section-label">结果集（并集）：</div>
                    <div id="projection-result-list"></div>
                </div>
            </div>
            <!-- 求解问题球 -->
            <div class="panel-section">
                <h3 class="section-title">🎯 求解问题球</h3>
                <div class="section-label">锚定中心点：</div>
                <select id="solve-anchor" class="input-field">
                    <option value="">选择中心点...</option>
                </select>
                <div class="section-label">模长（距锚点距离）：</div>
                <input id="solve-radius" type="number" value="3" step="0.1" min="0.1" class="input-field">
                <div class="section-label">方向参考目标球（可多选）：</div>
                <div id="solve-targets" class="relation-list"></div>
                <div class="section-label">路径参考球（勾选多个）：</div>
                <div id="solve-references" class="relation-list"></div>
                <div class="section-label">采样点数：</div>
                <input id="solve-samples" type="number" value="2000" step="500" min="100" max="20000" class="input-field">
                <div class="section-label">保存为资源球（可选）：</div>
                <input id="solve-save-name" type="text" placeholder="例如：Solved-A" class="input-field">
                <button id="btn-solve" class="btn btn-solve">开始求解</button>
                <button id="btn-solve-clear" class="btn btn-cancel" style="margin-top:6px;">清除求解结果</button>
                <div id="solve-result" class="coord-preview"></div>
            </div>
            <!-- 元素列表 -->
            <div class="panel-section">
                <h3 class="section-title">元素列表</h3>
                <div id="element-list" class="element-list"></div>
            </div>
        </div>
    </div>
    <!-- 编辑资源球模态框 -->
    <div id="edit-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <h3 class="modal-title">编辑资源球</h3>
            <input id="edit-sphere-name" type="text" placeholder="名称" class="input-field">
            <div class="name-row">
                <span class="section-label" style="margin:0;">模长：</span>
                <input id="edit-sphere-radius" type="number" value="1" step="0.1" min="0.1" class="input-field short">
            </div>
            <div class="section-label" style="margin-top:10px;">关联中心点及权重：</div>
            <div id="edit-sphere-relations" class="relation-list"></div>
            <div id="edit-sphere-preview" class="coord-preview"></div>
            <div class="modal-actions">
                <button id="btn-edit-cancel" class="btn btn-cancel">取消</button>
                <button id="btn-edit-save" class="btn btn-sphere">保存</button>
            </div>
        </div>
    </div>
    <script src="/static/three.min.js"></script>
    <script src="/static/OrbitControls.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
